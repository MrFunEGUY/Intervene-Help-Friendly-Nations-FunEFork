 edict_intervene_help_friendly_nation: "동맹의 §R전쟁§! 돕기"
 edict_intervene_help_friendly_nation_desc: "막대한 정치적 자본이 소비되겠지만, 우리의 국익에 도움이 된다면, 우리는 동맹국의 전쟁을 도울 수 있습니다."
 edict_intervene_help_friendly_nation_federated: "동맹의 §R전쟁§! 돕기"
 edict_intervene_help_friendly_nation_federated_desc: "막대한 정치적 자본이 소비되겠지만, 연방의 이익에 도움이 된다면, 우리는 동맹국의 전쟁을 도울 수 있습니다."
 
 intervene.1000.name: "군사적 지원"
 intervene.1000.desc: "우리와 최소한 적당한 관계를 맺고 있는, 전쟁을 이끌고 있는 나라들의 목록입니다. 은하게 안의 어떤 전쟁의 결과도 §H[root.GetName]§!에게 파급효과를 미칠 수 있기 때문에, 우리가 어떤 특정한 결과를 얻기를 원한다면, 그 결과를 얻기 위해 노력야 합니다. 우리는 이들 중 어느 나라의 전쟁에도 참전해서 그들의 노력을 지원할 수 있습니다.\n\n여러 개의 전쟁을 치르고 있는 나라가 있다면, 어떤 전쟁에 참가할지 선택해야 합니다."

